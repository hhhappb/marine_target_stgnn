paths:
  data_dir: data/sdrdsp_strict_256_v2
  save_dir: logs/training/repro_original_stgnn_sdrdsp_strict256_v2

dataset:
  type: scr_npz
  data_dir: data/sdrdsp_strict_256_v2

model:
  name: original_stgnn
  pulses: 4
  range_cells: 256

loss:
  type: cross_entropy
  use_class_weights: false

train:
  epochs: 500
  batch_size: 24
  learning_rate: 0.001
  optimizer: adam
  weight_decay: 0.0
  scheduler: none
  grad_clip: null
  num_workers: 0
  seed: 42

eval:
  protocol: pd_scr_curve
  threshold_source: train
  pfa_values: [0.0001, 0.001, 0.01]
