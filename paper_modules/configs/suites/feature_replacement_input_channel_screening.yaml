name: feature_replacement_input_channel_screening
description: 固定原 ST-GNN SFE/TFE 主干，只比较 FT/输入通道替换效果。
run_root: logs/training
target_pfa: 0.001
stop_on_failure: true

configs:
  - paper_modules/configs/feature_replacement_original_iq.yaml
  - paper_modules/configs/feature_replacement_iq_amp_phase.yaml
  - paper_modules/configs/feature_replacement_iq_amp_phase_diffs.yaml

seeds: [42]

overrides:
  epochs: 10
  batch_size: 32
  max_train_windows: 512
  max_test_windows_per_file: 20
